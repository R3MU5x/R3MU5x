<svg viewBox="0 0 1500 220" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" role="img" aria-label="Hi Jan — Network and Security Engineer">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6366F1"/>
      <stop offset="50%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gradient body with wavy bottom edge -->
  <path d="M0,0
           L1500,0
           L1500,170
           C1350,195 1200,150 1050,175
           C 900,200  750,155  600,180
           C 450,205  300,160  150,185
           C  75,195   25,175    0,185 Z"
        fill="url(#bgGrad)"/>

  <!-- Subtle highlight band on top -->
  <rect x="0" y="0" width="1500" height="3" fill="#ffffff" opacity="0.15"/>

  <!-- Main title -->
  <text x="750" y="98"
        font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
        font-size="64" font-weight="700"
        text-anchor="middle" fill="#ffffff"
        filter="url(#softGlow)">Hi Jan</text>

  <!-- Subtitle -->
  <text x="750" y="140"
        font-family="'JetBrains Mono', 'Fira Code', 'Consolas', monospace"
        font-size="20" font-weight="500"
        text-anchor="middle" fill="#e8e8f0"
        letter-spacing="1.5">Network &amp; Security Engineer · Germany</text>
</svg>

<svg viewBox="0 0 1500 120" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" role="img" aria-label="footer wave">
  <defs>
    <linearGradient id="footGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#A855F7"/>
      <stop offset="50%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Wave at top, solid gradient body below -->
  <path d="M0,40
           C150,15 300,55 450,35
           C600,15 750,55 900,35
           C1050,15 1200,55 1350,35
           C1425,25 1475,45 1500,35
           L1500,120 L0,120 Z"
        fill="url(#footGrad)"/>

  <!-- Subtle bottom highlight -->
  <rect x="0" y="117" width="1500" height="3" fill="#ffffff" opacity="0.1"/>
</svg>
